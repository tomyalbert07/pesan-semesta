<!DOCTYPE html>

<html lang="id">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Pesan Semesta</title>

<script src="https://cdn.jsdelivr.net/npm/particles.js@2.0.0/particles.min.js"></script>

<script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>

<style>

body{
margin:0;
font-family:Segoe UI;
background:linear-gradient(135deg,#141e30,#243b55);
color:white;
text-align:center;
overflow:hidden;
}

#particles-js{
position:absolute;
width:100%;
height:100%;
z-index:0;
}

.container{
position:relative;
z-index:2;
height:100vh;
display:flex;
flex-direction:column;
justify-content:center;
align-items:center;
padding:20px;
}

.page{
display:none;
animation:fadeUp 1s;
}

.cover{
display:block;
}

.card{
background:rgba(255,255,255,0.1);
padding:30px;
border-radius:20px;
backdrop-filter:blur(10px);
width:90%;
max-width:380px;
box-shadow:0 10px 40px rgba(0,0,0,0.4);
}

select,input{
padding:12px;
border:none;
border-radius:10px;
width:100%;
margin-top:10px;
}

button{
margin-top:15px;
padding:12px 25px;
border:none;
border-radius:30px;
background:#ffd166;
font-weight:bold;
cursor:pointer;
}

.cardMotivasi{

width:350px;
max-width:90%;
padding:40px;
border-radius:20px;
color:white;
margin:auto;
font-size:22px;
box-shadow:0 10px 30px rgba(0,0,0,0.4);

background-size:cover;
background-position:center;

}

.overlay{
background:rgba(0,0,0,0.45);
padding:30px;
border-radius:20px;
}

@keyframes fadeUp{
from{opacity:0;transform:translateY(40px)}
to{opacity:1;transform:translateY(0)}
}

</style>

</head>

<body>

<div id="particles-js"></div>

<div class="container">

<div id="page1" class="page cover">

<h1>✨ Pesan Semesta ✨</h1>
<p>Ada pesan untukmu hari ini</p>

<button onclick="nextPage(2)">Buka Pesan</button>

</div>

<div id="page2" class="page">

<div class="card">

<h2>Pilih Tema Pesan</h2>

<select id="kategori">
<option>Loading...</option>
</select>

<input id="nama" placeholder="Masukkan nama kamu">

<button onclick="generate()">Lihat Pesan</button>

</div>

</div>

<div id="page3" class="page">

<div id="cardMotivasi" class="cardMotivasi">

<div class="overlay">

<h2 id="namaCard"></h2>
<p id="kataCard"></p>

</div>

</div>

<button onclick="downloadGambar()">📸 Simpan Gambar</button>

</div>

</div>

<script>

/* PARTICLES */

particlesJS("particles-js",{
particles:{
number:{value:60},
size:{value:3},
move:{speed:1},
line_linked:{enable:true}
}
})

/* DATABASE */

let bankMotivasi=[]

async function loadMotivasi(){

let res=await fetch("https://script.google.com/macros/s/AKfycbzTDcehZKW3ZOyM2uFGFCCs9wNgQ2zroW7GlkTci2WyMZgul2uA0EQQn4KUAKFzcvUu/exec")
bankMotivasi=await res.json()

let kategoriUnik=[...new Set(bankMotivasi.map(m=>m.kategori))]

let select=document.getElementById("kategori")

select.innerHTML=""

kategoriUnik.forEach(k=>{

let opt=document.createElement("option")
opt.value=k
opt.textContent=k

select.appendChild(opt)

})

}

loadMotivasi()

let sudahGenerate=false

/* BACKGROUND */

const backgroundTema={

semangat:"https://source.unsplash.com/800x600/?sunrise",
hidup:"https://source.unsplash.com/800x600/?nature",
sukses:"https://source.unsplash.com/800x600/?success"

}

/* TEMPLATE */

const template=[

"{nama}, semesta ingin kamu tahu bahwa {pesan}",
"Hari ini {nama}, ingatlah bahwa {pesan}",
"Pesan kecil untukmu {nama}: {pesan}",
"{nama}, mungkin hari ini berat, tapi {pesan}"

]

/* NAVIGATION */

function nextPage(num){

document.querySelectorAll(".page").forEach(p=>p.style.display="none")
document.getElementById("page"+num).style.display="block"

}

/* GENERATE */

function generate(){

if(sudahGenerate){

alert("Pesan sudah dibuka. Refresh halaman untuk mencoba lagi.")
return

}

let nama=document.getElementById("nama").value
let kategori=document.getElementById("kategori").value

if(nama==""){

alert("Masukkan nama dulu")
return

}

let list = bankMotivasi.filter(m => m.kategori == kategori)

if(list.length==0){

alert("Database motivasi kosong")
return

}

let p = list[Math.floor(Math.random()*list.length)].pesan

let t=template[Math.floor(Math.random()*template.length)]

let kalimat=t.replace("{nama}",nama).replace("{pesan}",p)

/* LOG USER */

fetch("https://script.google.com/macros/s/AKfycbxxrJW_YldUE3boEUXEtg-8aHRQ9nMJTaTRu_BiS78AdJMKSLsvm6wLVti0fh1dRrF4/exec",{

method:"POST",
mode:"no-cors",
headers:{
"Content-Type":"application/json"
},

body:JSON.stringify({

nama:nama,
kategori:kategori,
pesan:kalimat,
waktu:new Date().toLocaleString()

})

})

document.getElementById("namaCard").innerText="Untuk "+nama
document.getElementById("kataCard").innerText=kalimat

if(backgroundTema[kategori]){

document.getElementById("cardMotivasi").style.backgroundImage=
"url("+backgroundTema[kategori]+")"

}else{

document.getElementById("cardMotivasi").style.backgroundImage=
"url(https://source.unsplash.com/800x600/?galaxy)"

}

nextPage(3)

sudahGenerate=true

}

/* DOWNLOAD */

function downloadGambar(){

let kartu=document.getElementById("cardMotivasi")

html2canvas(kartu).then(function(canvas){

let link=document.createElement("a")

link.download="pesan-semesta.png"
link.href=canvas.toDataURL()

link.click()

})

}

</script>

</body>
</html>
