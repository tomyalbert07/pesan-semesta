<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Renungan Jumat Agung ✝️</title>

    <!-- Modern Libraries -->
    <script src="https://cdn.jsdelivr.net/npm/particles.js@2.0.0/particles.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/html-to-image@1.11.11/dist/html-to-image.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.2/gsap.min.js"></script>
    <script src="https://unpkg.com/lucide@latest"></script>

    <style>
        @import url('https://fonts.googleapis.com/css2?family=Cinzel:wght@400;600;700&family=Cormorant+Garamond:ital,wght@0,400;0,600;1,400;1,600&family=Inter:wght@300;400;500;600&display=swap');

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        :root {
            --primary: #4c1d95;
            --secondary: #1e1b4b;
            --accent: #d4af37;
            --gold: #fbbf24;
            --dark: #0f0f1a;
            --glass: rgba(255, 255, 255, 0.05);
        }

        body {
            font-family: 'Inter', sans-serif;
            background: linear-gradient(135deg, #0f0f1a 0%, #1e1b4b 50%, #312e81 100%);
            color: white;
            min-height: 100vh;
            overflow-x: hidden;
            position: relative;
        }

        #particles-js {
            position: fixed;
            width: 100%;
            height: 100%;
            z-index: 0;
        }

        .gradient-orb {
            position: fixed;
            border-radius: 50%;
            filter: blur(100px);
            opacity: 0.3;
            z-index: 1;
            animation: float 25s infinite ease-in-out;
        }

        .orb-1 {
            width: 500px;
            height: 500px;
            background: radial-gradient(circle, #4c1d95, transparent);
            top: -150px;
            left: -150px;
        }

        .orb-2 {
            width: 400px;
            height: 400px;
            background: radial-gradient(circle, #1e1b4b, transparent);
            bottom: -100px;
            right: -100px;
            animation-delay: -12s;
        }

        .orb-3 {
            width: 300px;
            height: 300px;
            background: radial-gradient(circle, #d4af37, transparent);
            top: 50%;
            left: 50%;
            animation-delay: -8s;
            opacity: 0.15;
        }

        @keyframes float {
            0%, 100% { transform: translate(0, 0) scale(1); }
            33% { transform: translate(20px, -20px) scale(1.05); }
            66% { transform: translate(-15px, 15px) scale(0.95); }
        }

        .container {
            position: relative;
            z-index: 2;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            padding: 20px;
        }

        .page {
            display: none;
            width: 100%;
            max-width: 600px;
        }

        .page.active {
            display: block;
        }

        /* Page 1 - Cover */
        .cover-content {
            text-align: center;
            animation: fadeInUp 1s ease-out;
        }

        .cross-icon {
            font-size: 70px;
            margin-bottom: 25px;
            display: inline-block;
            color: #d4af37;
            filter: drop-shadow(0 0 30px rgba(212, 175, 55, 0.4));
            animation: glow 3s infinite alternate;
        }

        @keyframes glow {
            from { filter: drop-shadow(0 0 20px rgba(212, 175, 55, 0.3)); }
            to { filter: drop-shadow(0 0 40px rgba(212, 175, 55, 0.6)); }
        }

        h1 {
            font-family: 'Cinzel', serif;
            font-size: 2.5rem;
            font-weight: 700;
            background: linear-gradient(135deg, #fff, #d4af37);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            margin-bottom: 15px;
            letter-spacing: 2px;
        }

        .subtitle {
            font-size: 1.1rem;
            color: #a5b4fc;
            margin-bottom: 40px;
            font-weight: 300;
            font-family: 'Cormorant Garamond', serif;
            font-style: italic;
        }

        /* Glass Card */
        .glass-card {
            background: var(--glass);
            backdrop-filter: blur(20px);
            border: 1px solid rgba(212, 175, 55, 0.2);
            border-radius: 24px;
            padding: 40px;
            box-shadow: 
                0 25px 50px -12px rgba(0, 0, 0, 0.6),
                inset 0 1px 0 rgba(255, 255, 255, 0.05);
        }

        /* Form Elements */
        .form-group {
            margin-bottom: 30px;
        }

        label {
            display: block;
            font-size: 0.9rem;
            color: #d4af37;
            margin-bottom: 12px;
            font-weight: 500;
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        .input-wrapper {
            position: relative;
        }

        .input-icon {
            position: absolute;
            left: 18px;
            top: 50%;
            transform: translateY(-50%);
            color: #d4af37;
        }

        input {
            width: 100%;
            padding: 18px 18px 18px 50px;
            border: 2px solid rgba(212, 175, 55, 0.2);
            border-radius: 12px;
            background: rgba(15, 15, 26, 0.6);
            color: white;
            font-size: 1.1rem;
            font-family: 'Inter', sans-serif;
            transition: all 0.3s ease;
        }

        input:focus {
            outline: none;
            border-color: var(--accent);
            box-shadow: 0 0 0 4px rgba(212, 175, 55, 0.15);
        }

        input::placeholder {
            color: #64748b;
        }

        /* Buttons */
        .btn {
            width: 100%;
            padding: 18px 32px;
            border: none;
            border-radius: 12px;
            font-size: 1.1rem;
            font-weight: 600;
            font-family: 'Cinzel', serif;
            cursor: pointer;
            transition: all 0.3s ease;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 12px;
            letter-spacing: 1px;
        }

        .btn-primary {
            background: linear-gradient(135deg, #4c1d95, #6d28d9);
            color: white;
            border: 1px solid rgba(212, 175, 55, 0.3);
            box-shadow: 0 10px 30px -5px rgba(76, 29, 149, 0.5);
        }

        .btn-primary:hover {
            transform: translateY(-2px);
            box-shadow: 0 20px 40px -5px rgba(76, 29, 149, 0.6);
            border-color: rgba(212, 175, 55, 0.5);
        }

        .btn-primary:active {
            transform: translateY(0);
        }

        .btn-secondary {
            background: rgba(255, 255, 255, 0.05);
            color: white;
            border: 2px solid rgba(212, 175, 55, 0.3);
            margin-top: 15px;
        }

        .btn-secondary:hover {
            background: rgba(212, 175, 55, 0.1);
            border-color: rgba(212, 175, 55, 0.5);
        }

        /* Message Card - Jumat Agung Style */
        .message-card {
            background: linear-gradient(135deg, rgba(76, 29, 149, 0.4), rgba(30, 27, 75, 0.6));
            border-radius: 24px;
            padding: 50px 40px;
            text-align: center;
            position: relative;
            overflow: hidden;
            border: 1px solid rgba(212, 175, 55, 0.3);
            box-shadow: 
                0 25px 50px -12px rgba(0, 0, 0, 0.6),
                inset 0 1px 0 rgba(255, 255, 255, 0.1);
            min-height: 500px;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
        }

        .message-card::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: 
                radial-gradient(circle at 20% 50%, rgba(212, 175, 55, 0.1) 0%, transparent 50%),
                radial-gradient(circle at 80% 50%, rgba(76, 29, 149, 0.2) 0%, transparent 50%);
            pointer-events: none;
        }

        .card-content {
            position: relative;
            z-index: 1;
            width: 100%;
        }

        .cross-decoration {
            font-size: 50px;
            color: #d4af37;
            margin-bottom: 25px;
            opacity: 0.8;
        }

        .recipient-name {
            font-family: 'Cinzel', serif;
            font-size: 1.3rem;
            font-weight: 600;
            color: #d4af37;
            margin-bottom: 30px;
            text-transform: uppercase;
            letter-spacing: 3px;
        }

        .reminder-section {
            background: rgba(0, 0, 0, 0.2);
            border-radius: 16px;
            padding: 25px;
            margin-bottom: 30px;
            border-left: 3px solid #d4af37;
        }

        .reminder-label {
            font-size: 0.85rem;
            color: #d4af37;
            text-transform: uppercase;
            letter-spacing: 2px;
            margin-bottom: 15px;
            font-weight: 600;
        }

        .reminder-text {
            font-family: 'Cormorant Garamond', serif;
            font-size: 1.6rem;
            font-weight: 400;
            line-height: 1.5;
            color: #e0e7ff;
            font-style: italic;
        }

        .verse-section {
            margin-top: 30px;
            padding-top: 30px;
            border-top: 1px solid rgba(212, 175, 55, 0.2);
        }

        .verse-label {
            font-size: 0.8rem;
            color: #d4af37;
            text-transform: uppercase;
            letter-spacing: 2px;
            margin-bottom: 15px;
            font-weight: 600;
        }

        .verse-text {
            font-family: 'Cormorant Garamond', serif;
            font-size: 1.4rem;
            font-weight: 600;
            line-height: 1.6;
            color: #fff;
            margin-bottom: 15px;
        }

        .verse-reference {
            font-family: 'Cinzel', serif;
            font-size: 1rem;
            color: #d4af37;
            font-weight: 600;
        }

        .card-footer {
            margin-top: 40px;
            font-size: 0.9rem;
            color: #64748b;
            font-family: 'Cormorant Garamond', serif;
            font-style: italic;
        }

        /* Loading */
        .loading {
            display: inline-block;
            width: 20px;
            height: 20px;
            border: 3px solid rgba(212, 175, 55, 0.3);
            border-radius: 50%;
            border-top-color: #d4af37;
            animation: spin 1s ease-in-out infinite;
        }

        @keyframes spin {
            to { transform: rotate(360deg); }
        }

        /* Animations */
        @keyframes fadeInUp {
            from {
                opacity: 0;
                transform: translateY(40px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .fade-in {
            animation: fadeInUp 0.8s ease-out;
        }

        /* Toast Notification */
        .toast {
            position: fixed;
            bottom: 30px;
            left: 50%;
            transform: translateX(-50%) translateY(100px);
            background: rgba(15, 15, 26, 0.98);
            backdrop-filter: blur(10px);
            padding: 16px 24px;
            border-radius: 12px;
            border: 1px solid rgba(212, 175, 55, 0.3);
            box-shadow: 0 10px 30px rgba(0,0,0,0.5);
            display: flex;
            align-items: center;
            gap: 12px;
            opacity: 0;
            transition: all 0.3s ease;
            z-index: 1000;
        }

        .toast.show {
            transform: translateX(-50%) translateY(0);
            opacity: 1;
        }

        .toast-icon {
            color: #d4af37;
        }

        /* Responsive */
        @media (max-width: 480px) {
            h1 { font-size: 2rem; }
            .message-card { padding: 35px 25px; min-height: 450px; }
            .reminder-text { font-size: 1.4rem; }
            .verse-text { font-size: 1.2rem; }
            .glass-card { padding: 30px 25px; }
            .cross-icon { font-size: 55px; }
        }

        /* Decorative elements */
        .decorative-line {
            width: 60px;
            height: 2px;
            background: linear-gradient(90deg, transparent, #d4af37, transparent);
            margin: 20px auto;
        }
    </style>
</head>
<body>
    <!-- Background Effects -->
    <div id="particles-js"></div>
    <div class="gradient-orb orb-1"></div>
    <div class="gradient-orb orb-2"></div>
    <div class="gradient-orb orb-3"></div>

    <div class="container">
        <!-- Page 1: Cover -->
        <div id="page1" class="page active">
            <div class="cover-content">
                <div class="cross-icon">✝️</div>
                <h1>Renungan Jumat Agung</h1>
                <div class="decorative-line"></div>
                <p class="subtitle">Mari merenungkan pengorbanan-Nya yang menebus dosa-dosa kita</p>
                <button class="btn btn-primary" onclick="nextPage(2)">
                    <i data-lucide="book-open"></i>
                    Buka Renungan
                </button>
            </div>
        </div>

        <!-- Page 2: Form -->
        <div id="page2" class="page">
            <div class="glass-card fade-in">
                <h2 style="font-family: 'Cinzel', serif; font-size: 1.6rem; margin-bottom: 30px; text-align: center; color: #d4af37;">
                    <i data-lucide="user" style="vertical-align: middle; margin-right: 10px; width: 20px; height: 20px;"></i>
                    Renungan Pribadi
                </h2>

                <div class="form-group">
                    <label>Nama Kamu</label>
                    <div class="input-wrapper">
                        <i data-lucide="user" class="input-icon" style="width: 20px; height: 20px;"></i>
                        <input type="text" id="nama" placeholder="Masukkan nama untuk renungan pribadi..." maxlength="25">
                    </div>
                </div>

                <button class="btn btn-primary" onclick="generate()" id="btnGenerate">
                    <i data-lucide="cross"></i>
                    Lihat Renungan
                </button>

                <button class="btn btn-secondary" onclick="nextPage(1)">
                    <i data-lucide="arrow-left"></i>
                    Kembali
                </button>
            </div>
        </div>

        <!-- Page 3: Result -->
        <div id="page3" class="page">
            <div id="captureArea" class="message-card fade-in">
                <div class="card-content">
                    <div class="cross-decoration">✝️</div>
                    <div class="recipient-name" id="namaCard">Untuk Kamu</div>
                    
                    <div class="reminder-section">
                        <div class="reminder-label">Pengingat Dosa</div>
                        <p class="reminder-text" id="reminderCard">Memuat renungan...</p>
                    </div>

                    <div class="verse-section">
                        <div class="verse-label">Firman Tuhan</div>
                        <p class="verse-text" id="verseCard">Memuat ayat...</p>
                        <p class="verse-reference" id="verseRef">...</p>
                    </div>

                    <div class="card-footer">
                        <i data-lucide="cross" style="width: 14px; height: 14px; vertical-align: middle; color: #d4af37;"></i>
                        Jumat Agung — Pengorbanan yang Menebus
                    </div>
                </div>
            </div>

            <div style="margin-top: 25px; display: flex; gap: 15px; flex-wrap: wrap; justify-content: center;">
                <button class="btn btn-primary" onclick="downloadImage()" style="width: auto; flex: 1; min-width: 150px;">
                    <i data-lucide="download"></i>
                    Simpan
                </button>
                <button class="btn btn-secondary" onclick="resetApp()" style="width: auto; flex: 1; min-width: 150px;">
                    <i data-lucide="refresh-cw"></i>
                    Renung Lagi
                </button>
            </div>
        </div>
    </div>

    <!-- Toast -->
    <div class="toast" id="toast">
        <i data-lucide="check-circle" class="toast-icon"></i>
        <span id="toastMsg">Gambar berhasil disimpan!</span>
    </div>

    <script>
        // Initialize Lucide icons
        lucide.createIcons();

        // Particles Configuration - Subtle floating particles
        particlesJS("particles-js", {
            particles: {
                number: { value: 60, density: { enable: true, value_area: 800 } },
                color: { value: ["#d4af37", "#4c1d95", "#ffffff"] },
                shape: { type: "circle" },
                opacity: { value: 0.3, random: true },
                size: { value: 2, random: { enable: true, minimum_value: 1 } },
                line_linked: {
                    enable: true,
                    distance: 150,
                    color: "#4c1d95",
                    opacity: 0.1,
                    width: 1
                },
                move: {
                    enable: true,
                    speed: 0.8,
                    direction: "none",
                    random: true,
                    straight: false,
                    out_mode: "out",
                    bounce: false,
                }
            },
            interactivity: {
                detect_on: "canvas",
                events: {
                    onhover: { enable: true, mode: "grab" },
                    onclick: { enable: true, mode: "push" },
                    resize: true
                },
                modes: {
                    grab: { distance: 140, line_linked: { opacity: 0.2 } },
                    push: { particles_nb: 3 }
                }
            },
            retina_detect: true
        });

        // Database - Jumat Agung Reminders & Bible Verses
        // User can customize this array with their own content
        let bankRenungan = [
            {
                reminder: "Dosa-dosamu telah ditanggung oleh Dia di kayu salib. Setiap kali kamu jatuh, ingatlah bahwa pengorbanan-Nya sudah cukup untuk menebusmu.",
                verse: "Ia sendiri telah memikul dosa kita di dalam tubuh-Nya di kayu salib, supaya kita, yang telah mati terhadap dosa, hidup untuk kebenaran. Oleh bilur-bilur-Nya kamu telah sembuh.",
                reference: "1 Petrus 2:24"
            },
            {
                reminder: "Kasih Allah begitu besar hingga Ia rela mengaruniakan Anak-Nya yang tunggal. Jangan sia-siakan pengorbanan ini dengan terus hidup dalam dosa.",
                verse: "Karena begitu besar kasih Allah akan dunia ini, sehingga Ia telah mengaruniakan Anak-Nya yang tunggal, supaya setiap orang yang percaya kepada-Nya tidak binasa, melainkan beroleh hidup yang kekal.",
                reference: "Yohanes 3:16"
            },
            {
                reminder: "Yesus mati untukmu ketika kamu masih berdosa. Jangan biarkan dosa lama menguasaimu lagi—kamu sudah dibebaskan.",
                verse: "Tetapi Allah menyatakan kasih-Nya kepada kita, bahwa ketika kita masih menjadi pendosa, Kristus mati bagi kita.",
                reference: "Roma 5:8"
            },
            {
                reminder: "Penyakitmu, kesengsaraanmu, dan dosa-dosamu telah ditanggung-Nya. Bersyukurlah atas luka-luka yang menyembuhkanmu.",
                verse: "Sesungguhnya, penyakit kitalah yang ditanggungnya, dan kesengsaraan kita yang dipikulnya... dia tertikam oleh karena pemberontakan kita, dia diremukkan oleh karena kejahatan kita.",
                reference: "Yesaya 53:4-5"
            },
            {
                reminder: "Kristus menjadi kutuk karena kamu, supaya kamu menerima berkat-berkat Abraham. Jangan hidup dalam kutuk dosa lagi.",
                verse: "Kristus telah menebus kita dari kutuk hukum Taurat dengan jalan menjadi kutuk karena kita, sebab ada tertulis: Terkutuklah orang yang digantung pada kayu salib!",
                reference: "Galatia 3:13"
            },
            {
                reminder: "Upah dosa adalah maut, tetapi kamu telah menerima karunia hidup kekal. Hargailah kematian-Nya dengan meninggalkan jalan dosa.",
                verse: "Karena upah dosa ialah maut, tetapi karunia Allah ialah hidup yang kekal dalam Kristus Yesus, Tuhan kita.",
                reference: "Roma 6:23"
            },
            {
                reminder: "Anak Manusia datang bukan untuk dilayani, melainkan untuk melayani dan memberikan nyawa-Nya menjadi tebusan. Ikuti teladan kerendahan hati-Nya.",
                verse: "Karena Anak Manusia juga datang bukan untuk dilayani, melainkan untuk melayani dan untuk memberikan nyawa-Nya menjadi tebusan bagi banyak orang.",
                reference: "Markus 10:45"
            },
            {
                reminder: "Kristus mati bagi kita sekali untuk dosa, yang mati bagi dosa untuk selama-lamanya. Hidupmu sekarang adalah untuk kebenaran, bukan untuk dosa.",
                verse: "Sebab Kristus telah mati bagi kita sekali untuk dosa, yang mati bagi dosa untuk selama-lamanya, tetapi yang hidup bagi Allah.",
                reference: "1 Petrus 3:18"
            },
            {
                reminder: "Darah-Nya yang tak bercacat menyucikan hati nuranimu. Datanglah kepada-Nya dengan hati yang tulus untuk diperbarui.",
                verse: "Betapa lebihnya darah Kristus, yang melalui Roh yang kekal telah mempersembahkan diri-Nya sendiri kepada Allah dengan tak bercacat, akan menyucikan hati nuranimu dari perbuatan-perbuatan yang sia-sia.",
                reference: "Ibrani 9:14"
            },
            {
                reminder: "Allah tidak menyayangkan Anak-Nya sendiri, tetapi menyerahkan-Nya bagi kita semua. Balaslah kasih ini dengan kesetiaan.",
                verse: "Ia, yang tidak menyayangkan Anak-Nya sendiri, tetapi yang menyerahkan-Nya bagi kita semua, bagaimanakah mungkin Ia tidak mengaruniakan segala sesuatu kepada kita bersama-sama dengan Dia?",
                reference: "Roma 8:32"
            }
        ];

        let sudahGenerate = false;

        // Templates for personalization
        const templates = [
            "{nama}, {reminder}",
            "Hai {nama}, {reminder}",
            "{nama}, renungkanlah: {reminder}",
            "Untukmu {nama}: {reminder}",
            "{nama}, pada hari yang kudus ini, {reminder}"
        ];

        // Navigation
        function nextPage(num) {
            gsap.to(".page.active", {
                opacity: 0,
                y: -20,
                duration: 0.3,
                onComplete: () => {
                    document.querySelectorAll(".page").forEach(p => p.classList.remove("active"));
                    const target = document.getElementById("page" + num);
                    target.classList.add("active");
                    gsap.fromTo(target, 
                        { opacity: 0, y: 20 },
                        { opacity: 1, y: 0, duration: 0.5, ease: "power2.out" }
                    );
                }
            });
        }

        // Generate message
        async function generate() {
            if (sudahGenerate) {
                showToast("Renungan sudah dibuat. Klik 'Renung Lagi' untuk renungan baru!", "info");
                return;
            }

            const nama = document.getElementById("nama").value.trim();

            if (!nama) {
                shakeElement(document.getElementById("nama").parentElement);
                return;
            }

            // Show loading state
            const btn = document.getElementById("btnGenerate");
            const originalContent = btn.innerHTML;
            btn.innerHTML = '<span class="loading"></span> Memuat...';
            btn.disabled = true;

            // Simulate loading for effect
            await new Promise(r => setTimeout(r, 1000));

            // Select random renungan
            const randomRenungan = bankRenungan[Math.floor(Math.random() * bankRenungan.length)];
            const randomTemplate = templates[Math.floor(Math.random() * templates.length)];
            
            // Personalize reminder text
            const personalizedReminder = randomTemplate
                .replace("{nama}", nama)
                .replace("{reminder}", randomRenungan.reminder);

            // Update card
            document.getElementById("namaCard").innerText = "Untuk " + nama;
            document.getElementById("reminderCard").innerText = personalizedReminder;
            document.getElementById("verseCard").innerText = '"' + randomRenungan.verse + '"';
            document.getElementById("verseRef").innerText = "— " + randomRenungan.reference;

            // Reset button
            btn.innerHTML = originalContent;
            btn.disabled = false;
            lucide.createIcons();

            // Navigate
            nextPage(3);
            sudahGenerate = true;

            // Log activity (optional - can be disabled if no backend)
            try {
                fetch("https://script.google.com/macros/s/AKfycbxxrJW_YldUE3boEUXEtg-8aHRQ9nMJTaTRu_BiS78AdJMKSLsvm6wLVti0fh1dRrF4/exec", {
                    method: "POST",
                    mode: "no-cors",
                    headers: { "Content-Type": "application/json" },
                    body: JSON.stringify({
                        nama: nama,
                        reminder: randomRenungan.reminder,
                        ayat: randomRenungan.verse,
                        referensi: randomRenungan.reference,
                        waktu: new Date().toLocaleString("id-ID")
                    })
                });
            } catch (e) {
                console.log("Logging failed, continuing...");
            }
        }

        // Download image using html-to-image
        async function downloadImage() {
            const card = document.getElementById("captureArea");

            try {
                showToast("Menyimpan renungan...", "info");

                const dataUrl = await htmlToImage.toPng(card, {
                    quality: 1,
                    pixelRatio: 2,
                    backgroundColor: null
                });

                const link = document.createElement("a");
                link.download = `renungan-jumat-agung-${Date.now()}.png`;
                link.href = dataUrl;
                link.click();

                showToast("Renungan berhasil disimpan! ✝️", "success");
            } catch (error) {
                console.error("Error:", error);
                showToast("Gagal menyimpan gambar", "error");
            }
        }

        // Reset app
        function resetApp() {
            sudahGenerate = false;
            document.getElementById("nama").value = "";
            nextPage(2);
        }

        // UI Effects
        function shakeElement(element) {
            gsap.to(element, {
                x: [-10, 10, -10, 10, 0],
                duration: 0.4,
                ease: "power2.out"
            });
        }

        function showToast(message, type = "success") {
            const toast = document.getElementById("toast");
            const toastMsg = document.getElementById("toastMsg");
            const toastIcon = toast.querySelector(".toast-icon");

            toastMsg.textContent = message;

            if (type === "error") {
                toastIcon.setAttribute("data-lucide", "x-circle");
                toastIcon.style.color = "#ef4444";
            } else if (type === "info") {
                toastIcon.setAttribute("data-lucide", "info");
                toastIcon.style.color = "#d4af37";
            } else {
                toastIcon.setAttribute("data-lucide", "check-circle");
                toastIcon.style.color = "#d4af37";
            }

            lucide.createIcons();
            toast.classList.add("show");

            setTimeout(() => {
                toast.classList.remove("show");
            }, 3000);
        }

        // Enter key support
        document.getElementById("nama").addEventListener("keypress", (e) => {
            if (e.key === "Enter") generate();
        });

        // Add mouse move parallax effect
        document.addEventListener("mousemove", (e) => {
            const orbs = document.querySelectorAll(".gradient-orb");
            const x = e.clientX / window.innerWidth;
            const y = e.clientY / window.innerHeight;

            orbs.forEach((orb, index) => {
                const speed = (index + 1) * 15;
                gsap.to(orb, {
                    x: (x - 0.5) * speed,
                    y: (y - 0.5) * speed,
                    duration: 1,
                    ease: "power2.out"
                });
            });
        });
    </script>
</body>
</html>
